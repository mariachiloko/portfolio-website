<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Miguel Cervantes Infrastructure Support and Cloud Automation</title>
  <desc id="desc">A social preview card for Miguel Cervantes, focused on Windows support, Active Directory, Citrix, networking, AWS, Terraform, and infrastructure automation.</desc>
  <defs>
